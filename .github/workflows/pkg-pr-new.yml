name: Continuous Release (pkg.pr.new)

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - main

concurrency:
  group: pkg-pr-new-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  publish:
    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: pnpm/action-setup@v4
        with:
          version: 10.25.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm check:dist

      - name: Publish preview package
        id: publish
        continue-on-error: true
        run: pnpm dlx pkg-pr-new publish --no-compact

      - name: Warn if pkg.pr.new is unavailable
        if: steps.publish.outcome == 'failure'
        run: |
          echo "::warning::pkg.pr.new publish failed. Install the GitHub App at https://github.com/apps/pkg-pr-new on meekmachine/Polymer, then re-run this job. LoomLarge Depends-on links will fall back to git SHA until then."

      - name: Notify LoomLarge to retest Depends-on PRs
        if: ${{ github.event_name == 'pull_request' }}
        continue-on-error: true
        env:
          # PAT/app token with actions:write + pull-requests:read on LoomLarge.
          # Required once Polymer is private; github.token cannot reach LoomLarge.
          GH_TOKEN: ${{ secrets.CROSS_REPO_CI_TOKEN }}
          DEPENDENCY_REPO: ${{ github.repository }}
          DEPENDENCY_PR: ${{ github.event.pull_request.number }}
          DEPENDENCY_SHA: ${{ github.event.pull_request.head.sha }}
          HOST_REPO: meekmachine/LoomLarge
        run: |
          set -euo pipefail
          if [[ -z "${GH_TOKEN}" ]]; then
            echo "::warning::CROSS_REPO_CI_TOKEN unset; host Depends-on PRs will not auto-retest after this publish. Add a token with LoomLarge actions:write (and the same secret on LoomLarge for private upstream reads)."
            exit 0
          fi

          echo "Dispatching LoomLarge upstream-dependency-updated for ${DEPENDENCY_REPO}#${DEPENDENCY_PR} (${DEPENDENCY_SHA})"
          gh api --method POST "repos/${HOST_REPO}/dispatches" --input - <<EOF || true
          {
            "event_type": "upstream-dependency-updated",
            "client_payload": {
              "dependency_repo": "${DEPENDENCY_REPO}",
              "dependency_pr": "${DEPENDENCY_PR}",
              "dependency_sha": "${DEPENDENCY_SHA}"
            }
          }
          EOF

          # Direct retest so host CI updates even before the LoomLarge dispatch
          # workflow exists on main.
          chmod +x .github/scripts/retest-linked-host-prs.sh
          .github/scripts/retest-linked-host-prs.sh
